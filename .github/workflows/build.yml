name: Build and Release

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]

# ─────────────────────────────────────────────────────────────────────────────
# JOB 1 — Windows Electron .exe installer
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  build-windows:
    name: Windows EXE
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linting
        run: npm run lint
        continue-on-error: true

      - name: Run type check
        run: npm run typecheck

      - name: Build Electron app (Windows)
        run: npm run electron:build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: |
            release/*.exe
            release/*.msi
          retention-days: 30

# ─────────────────────────────────────────────────────────────────────────────
# JOB 2 — Android APK (Capacitor)
# ─────────────────────────────────────────────────────────────────────────────
  build-android:
    name: Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install

      - name: Build web assets
        run: npm run build

      - name: Add Android platform (if not committed)
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: Inject SerialPrinter plugin
        run: |
          PKG="android/app/src/main/java/com/corpv3/restaurantpos"
          # Copy plugin Java file into the app package
          cp android-plugin/SerialPrinterPlugin.java "$PKG/"
          # Add import line after existing BridgeActivity import
          sed -i 's/import com.getcapacitor.BridgeActivity;/import com.getcapacitor.BridgeActivity;\nimport com.corpv3.restaurantpos.SerialPrinterPlugin;/' "$PKG/MainActivity.java"
          # Register plugin before super.onCreate
          sed -i 's/super.onCreate(savedInstanceState);/registerPlugin(SerialPrinterPlugin.class);\n        super.onCreate(savedInstanceState);/' "$PKG/MainActivity.java"

      - name: Sync Capacitor
        run: npx cap sync android

      # ── Debug APK — every push to main ────────────────────────────────────
      - name: Build debug APK
        if: "!startsWith(github.ref, 'refs/tags/v')"
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      # ── Release APK — tag pushes only, signed ─────────────────────────────
      - name: Decode keystore
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/app/release.keystore

      - name: Build release APK (signed)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon \
            -Pandroid.injected.signing.store.file=release.keystore \
            -Pandroid.injected.signing.store.password="${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" \
            -Pandroid.injected.signing.key.alias="${{ secrets.ANDROID_KEY_ALIAS }}" \
            -Pandroid.injected.signing.key.password="${{ secrets.ANDROID_KEY_PASSWORD }}"

      - name: Rename APK with version tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          APK=$(find android -name '*-release*.apk' | head -1)
          cp "$APK" "RestaurantPOS-${{ github.ref_name }}-android.apk"

      - name: Upload Android debug artifact
        if: "!startsWith(github.ref, 'refs/tags/v')"
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: android/**/*.apk
          retention-days: 14

      - name: Upload Android release artifact
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: android-release-apk
          path: RestaurantPOS-*-android.apk
          retention-days: 90

# ─────────────────────────────────────────────────────────────────────────────
# JOB 3 — GitHub Release
#          Publishes BOTH Windows .exe AND Android .apk to the same release
# ─────────────────────────────────────────────────────────────────────────────
  release:
    name: Publish GitHub Release
    needs: [build-windows, build-android]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download Windows installer
        uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: ./artifacts/windows

      - name: Download Android APK
        uses: actions/download-artifact@v4
        with:
          name: android-release-apk
          path: ./artifacts/android

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/windows/*.exe
            artifacts/windows/*.msi
            artifacts/android/*.apk
          draft: false
          prerelease: false
          generate_release_notes: true
          body: |
            ## Restaurant POS ${{ github.ref_name }}

            ### Downloads
            | Platform | File | Notes |
            |----------|------|-------|
            | Windows | `RestaurantPOS-Setup.exe` | Run installer, supports auto-update |
            | Android | `RestaurantPOS-${{ github.ref_name }}-android.apk` | Sideload — enable "Install Unknown Apps" in Android settings |

            ### Android Thermal Printer Setup
            1. Pair your ESC/POS Bluetooth printer in **Android Settings → Bluetooth**
            2. Open POS app → **Settings → Printer**
            3. Tap **Scan** to list paired Bluetooth devices
            4. Tap **Use** next to your printer to connect
            5. Tap **Test Print** to verify

            > Compatible with 58mm and 80mm ESC/POS Bluetooth thermal printers
            > (Sunmi, GOOJPRT, Rongta, Xprinter, Epson TM, and most generic brands)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
