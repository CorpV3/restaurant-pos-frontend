name: Build and Release

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]

permissions:
  contents: write

# ─────────────────────────────────────────────────────────────────────────────
# JOB 1 — Windows Electron .exe installer
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  build-windows:
    name: Windows EXE
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linting
        run: npm run lint
        continue-on-error: true

      - name: Run type check
        run: npm run typecheck

      - name: Build Electron app (Windows)
        run: npx tsc && npx vite build --mode electron && npx electron-builder --win --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: |
            release/*.exe
            release/*.msi
          retention-days: 30

# ─────────────────────────────────────────────────────────────────────────────
# JOB 2 — Android APK (Capacitor)
# ─────────────────────────────────────────────────────────────────────────────
  build-android:
    name: Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install

      - name: Build web assets
        run: npm run build

      - name: Add Android platform (if not committed)
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: Inject plugins
        run: |
          PKG="android/app/src/main/java/com/corpv3/restaurantpos"
          cp android-plugin/SerialPrinterPlugin.java "$PKG/"
          cp android-plugin/PrinterJSInterface.java "$PKG/"
          cp android-plugin/SumUpPlugin.java "$PKG/"
          cp android-plugin/MainActivity.java "$PKG/"

      - name: Sync Capacitor
        run: npx cap sync android
        # Note: SumUpPlugin uses a compile stub (no SDK dependency needed).
        # To re-enable native Tap-to-Pay: place SumUpSDK.aar in android/app/libs/,
        # restore the real SumUpPlugin.java, and re-add the SDK dependency here.

      # ── Build debug APK — always ───────────────────────────────────────────
      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Rename APK with version tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          APK=$(find android -name '*-debug*.apk' | head -1)
          cp "$APK" "RestaurantPOS-${{ github.ref_name }}-android.apk"

      - name: Upload Android debug artifact (branch)
        if: "!startsWith(github.ref, 'refs/tags/v')"
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: android/**/*.apk
          retention-days: 14

      - name: Upload Android release artifact (tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: android-release-apk
          path: RestaurantPOS-*-android.apk
          retention-days: 90

# ─────────────────────────────────────────────────────────────────────────────
# JOB 3 — GitHub Release
#          Publishes BOTH Windows .exe AND Android .apk to the same release
# ─────────────────────────────────────────────────────────────────────────────
  release:
    name: Publish GitHub Release
    needs: [build-windows, build-android]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download Windows installer
        uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: ./artifacts/windows

      - name: Download Android APK
        uses: actions/download-artifact@v4
        with:
          name: android-release-apk
          path: ./artifacts/android

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/windows/*.exe
            artifacts/windows/*.msi
            artifacts/android/*.apk
          draft: false
          prerelease: false
          generate_release_notes: true
          body: |
            ## Restaurant POS ${{ github.ref_name }}

            ### Downloads
            | Platform | File | Notes |
            |----------|------|-------|
            | Windows | `RestaurantPOS-Setup.exe` | Run installer, supports auto-update |
            | Android | `RestaurantPOS-${{ github.ref_name }}-android.apk` | Sideload — enable "Install Unknown Apps" in Android settings |

            ### Android Thermal Printer Setup
            **Citaq H10-3 (built-in serial printer):**
            - Internal printer on `/dev/ttyS1` is used automatically — no setup needed
            - Open POS app → **Settings → Printer** → select **Serial (Built-in)**
            - Tap **Test Print** to verify

            **External Bluetooth printer:**
            1. Pair printer in **Android Settings → Bluetooth**
            2. Open POS app → **Settings → Printer** → select **Bluetooth**
            3. Tap **Scan**, then **Use** next to your printer
            4. Tap **Test Print** to verify

            > Compatible with 58mm and 80mm ESC/POS thermal printers
            > (Citaq H10-3 built-in, Sunmi, GOOJPRT, Rongta, Xprinter, Epson TM)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
