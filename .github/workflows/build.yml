name: Build and Release

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]

permissions:
  contents: write

# ─────────────────────────────────────────────────────────────────────────────
# JOB 1 — Windows Electron .exe installer
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  build-windows:
    name: Windows EXE
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linting
        run: npm run lint
        continue-on-error: true

      - name: Run type check
        run: npm run typecheck

      - name: Build Electron app (Windows)
        run: npx tsc && npx vite build --mode electron && npx electron-builder --win --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: |
            release/*.exe
            release/*.msi
          retention-days: 30

# ─────────────────────────────────────────────────────────────────────────────
# JOB 2 — Android APK (Capacitor)
# ─────────────────────────────────────────────────────────────────────────────
  build-android:
    name: Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install

      - name: Build web assets
        run: npm run build

      - name: Add Android platform (if not committed)
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: Inject plugins
        run: |
          PKG="android/app/src/main/java/com/corpv3/restaurantpos"
          cp android-plugin/SerialPrinterPlugin.java "$PKG/"
          cp android-plugin/PrinterJSInterface.java "$PKG/"
          cp android-plugin/SumUpPlugin.java "$PKG/"
          cp android-plugin/MainActivity.java "$PKG/"

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Add SumUp SDK dependency
        run: |
          # Fix: allow project-level repos (prevents "rootProject on null object" Gradle error
          # caused by FAIL_ON_PROJECT_REPOS mode conflicting with allprojects{} below)
          sed -i 's/RepositoriesMode\.FAIL_ON_PROJECT_REPOS/RepositoriesMode.PREFER_PROJECT/' android/settings.gradle || true

          # Add SumUp Maven repo to root build.gradle
          echo "" >> android/build.gradle
          echo "allprojects {" >> android/build.gradle
          echo "    repositories {" >> android/build.gradle
          echo "        maven { url 'https://maven.sumup.com/releases' }" >> android/build.gradle
          echo "    }" >> android/build.gradle
          echo "}" >> android/build.gradle

          # Raise minSdkVersion to 26 (SumUp v7 minimum)
          sed -i 's/minSdkVersion *= *[0-9]*/minSdkVersion = 26/' android/variables.gradle || true

          # Enable coreLibraryDesugaring + add SumUp SDK to app/build.gradle
          echo "" >> android/app/build.gradle
          echo "android {" >> android/app/build.gradle
          echo "    compileOptions {" >> android/app/build.gradle
          echo "        coreLibraryDesugaringEnabled true" >> android/app/build.gradle
          echo "    }" >> android/app/build.gradle
          echo "}" >> android/app/build.gradle
          echo "dependencies {" >> android/app/build.gradle
          echo "    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.1.5'" >> android/app/build.gradle
          echo "    implementation 'com.sumup:merchant-sdk:7.0.0'" >> android/app/build.gradle
          echo "}" >> android/app/build.gradle

      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Rename APK with version tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          APK=$(find android -name '*-debug*.apk' | head -1)
          cp "$APK" "RestaurantPOS-${{ github.ref_name }}-android.apk"

      - name: Upload Android debug artifact (branch)
        if: "!startsWith(github.ref, 'refs/tags/v')"
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: android/**/*.apk
          retention-days: 14

      - name: Upload Android release artifact (tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: android-release-apk
          path: RestaurantPOS-*-android.apk
          retention-days: 90

# ─────────────────────────────────────────────────────────────────────────────
# JOB 3 — iOS IPA (Capacitor, unsigned — sideload via AltStore / Configurator)
#          Targets iOS 13+ for broad iPad compatibility (Air 2, mini 4, etc.)
# ─────────────────────────────────────────────────────────────────────────────
  build-ios:
    name: iOS IPA
    runs-on: macos-latest
    env:
      CI: 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build web assets
        run: npm run build

      - name: Add iOS platform
        run: npx cap add ios

      - name: Sync Capacitor
        run: npx cap sync ios

      - name: Install CocoaPods dependencies
        run: |
          cd ios/App
          pod install

      - name: Set minimum deployment target to iOS 13
        run: |
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = [0-9.]*/IPHONEOS_DEPLOYMENT_TARGET = 13.0/g' \
            ios/App/App.xcodeproj/project.pbxproj

      - name: Build iOS archive (unsigned)
        run: |
          xcodebuild \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -archivePath "$PWD/App.xcarchive" \
            -destination "generic/platform=iOS" \
            IPHONEOS_DEPLOYMENT_TARGET=13.0 \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            archive 2>&1 | tail -100

      - name: Package unsigned IPA
        run: |
          APP=$(find App.xcarchive/Products/Applications -name '*.app' | head -1)
          mkdir -p Payload
          cp -r "$APP" Payload/App.app
          VERSION="${{ github.ref_name }}"
          [ -z "$VERSION" ] && VERSION="dev"
          zip -r "RestaurantPOS-${VERSION}-ios.ipa" Payload/
          rm -rf Payload
          ls -lh RestaurantPOS-*.ipa

      - name: Upload iOS debug artifact (branch)
        if: "!startsWith(github.ref, 'refs/tags/v')"
        uses: actions/upload-artifact@v4
        with:
          name: ios-debug-ipa
          path: "*.ipa"
          retention-days: 14

      - name: Upload iOS release artifact (tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: ios-release-ipa
          path: "RestaurantPOS-*-ios.ipa"
          retention-days: 90

# ─────────────────────────────────────────────────────────────────────────────
# JOB 4 — GitHub Release
#          Publishes Windows .exe, Android .apk, and iOS .ipa to the release
# ─────────────────────────────────────────────────────────────────────────────
  release:
    name: Publish GitHub Release
    needs: [build-windows, build-android, build-ios]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download Windows installer
        uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: ./artifacts/windows

      - name: Download Android APK
        uses: actions/download-artifact@v4
        with:
          name: android-release-apk
          path: ./artifacts/android

      - name: Download iOS IPA
        uses: actions/download-artifact@v4
        with:
          name: ios-release-ipa
          path: ./artifacts/ios

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/windows/*.exe
            artifacts/windows/*.msi
            artifacts/android/*.apk
            artifacts/ios/*.ipa
          draft: false
          prerelease: false
          generate_release_notes: true
          body: |
            ## Restaurant POS ${{ github.ref_name }}

            ### Downloads
            | Platform | File | Notes |
            |----------|------|-------|
            | Windows | `RestaurantPOS-Setup.exe` | Run installer, supports auto-update |
            | Android | `RestaurantPOS-${{ github.ref_name }}-android.apk` | Enable "Install Unknown Apps" in Android Settings |
            | iPad / iPhone | `RestaurantPOS-${{ github.ref_name }}-ios.ipa` | Sideload via AltStore or Apple Configurator 2 |

            ### Direct Download Links
            - Windows: https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/RestaurantPOS-Setup.exe
            - Android: https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/RestaurantPOS-${{ github.ref_name }}-android.apk
            - iOS: https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/RestaurantPOS-${{ github.ref_name }}-ios.ipa

            ### iOS Sideloading Instructions
            The IPA is **unsigned** — install it using one of:
            - **AltStore** (free): open AltStore on iPhone/iPad → My Apps → + → select IPA
            - **Apple Configurator 2** (Mac): connect iPad → Add → App → select IPA
            - **Sideloadly** (Windows/Mac): drag IPA in, connect device, sign in with Apple ID

            ### Android Thermal Printer Setup
            **Citaq H10-3 (built-in serial printer):**
            - Open POS app → **Settings → Printer** → select **Serial (Built-in)**
            - Default port `/dev/ttyS1` — tap **Test Print** to verify

            **External Bluetooth printer:**
            1. Pair printer in **Android Settings → Bluetooth**
            2. Open POS app → **Settings → Printer** → select **Bluetooth**
            3. Tap **Scan** → **Use** next to your printer → **Test Print**

            > Compatible with 58mm and 80mm ESC/POS thermal printers
            > (Citaq H10-3, Sunmi, GOOJPRT, Rongta, Xprinter, Epson TM)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Echo download links
        run: |
          REPO="${{ github.repository }}"
          TAG="${{ github.ref_name }}"
          BASE="https://github.com/${REPO}/releases/download/${TAG}"
          echo ""
          echo "================================================================"
          echo "  RELEASE ${TAG} - DOWNLOAD LINKS"
          echo "================================================================"
          echo "  Windows EXE:"
          echo "  ${BASE}/RestaurantPOS-Setup.exe"
          echo ""
          echo "  Android APK:"
          echo "  ${BASE}/RestaurantPOS-${TAG}-android.apk"
          echo ""
          echo "  iOS IPA:"
          echo "  ${BASE}/RestaurantPOS-${TAG}-ios.ipa"
          echo ""
          echo "  Release page:"
          echo "  https://github.com/${REPO}/releases/tag/${TAG}"
          echo "================================================================"
